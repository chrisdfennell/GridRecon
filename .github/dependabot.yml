version: 2
updates:
  # Keep the GitHub Actions used in CI / release workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Python deps for the asset-generation tools (tools/requirements.txt).
  - package-ecosystem: "pip"
    directory: "/tools"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
